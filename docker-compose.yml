x-db-url: &db-url postgres://postgres:postgres@postgres:5432/url_shortener?sslmode=disable

services:

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: url_shortener
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrate:
    image: migrate/migrate
    volumes:
      - ./migrations:/migrations
    command:
      [
        "-path",
        "/migrations",
        "-database",
        *db-url,
        "up"
      ]
    depends_on:
      postgres:
        condition: service_healthy
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: *db-url
      BASE_URL: http://localhost:8080
      PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./migrations:/app/migrations

volumes:
  postgres_data: